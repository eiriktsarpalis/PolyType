---
version: 2
updates:
  # Enable version updates for NuGet packages
  # This repository uses Central Package Management with
  # Directory.Packages.props
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"
    # Exclude packages that track .NET runtime versions - these should only be
    # updated manually as part of broader .NET version updates.
    # Note: do NOT use a top-level `allow:` block here. When `allow:` is set,
    # Dependabot only considers the listed dependencies and silently drops
    # everything else (xunit, TUnit, BenchmarkDotNet, StyleCop, etc.).
    ignore:
      - dependency-name: "System.*"
      - dependency-name: "Microsoft.Bcl.*"
      - dependency-name: "Microsoft.Extensions.*"
      - dependency-name: "Microsoft.NET.Test.Sdk"
    groups:
      # Group test framework updates together
      test-frameworks:
        patterns:
          - "xunit*"
          - "TUnit*"
      # Group Microsoft Testing Platform extensions
      testing-platform:
        patterns:
          - "Microsoft.Testing.*"
      # Group build and analyzer tools
      build-tools:
        patterns:
          - "StyleCop.Analyzers"
          - "PolySharp"
          - "Nerdbank.GitVersioning"
          - "Microsoft.CodeAnalysis.*"
      # Group benchmarking tools
      benchmarking:
        patterns:
          - "BenchmarkDotNet"

  # Enable version updates for .NET tools
  - package-ecosystem: "nuget"
    directory: "/.config"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "tools"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Group common GitHub Actions together
      github-actions:
        patterns:
          - "actions/*"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "docker"
      include: "scope"
